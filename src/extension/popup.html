<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doraemon</title>
    <style>
      :root {
        --sky: #dff4ff;
        --blue: #1f8ee7;
        --deep: #113056;
        --cream: #fffaf8;
        --rose: #ffe5ea;
        --green: #def7d9;
        --red: #ffdde0;
      }
      body {
        font: 14px/1.4 ui-rounded, "Hiragino Maru Gothic ProN", "Trebuchet MS", sans-serif;
        margin: 0;
        min-width: 300px;
        background:
          radial-gradient(circle at top, #ffffff 0%, var(--sky) 58%, #bfe4ff 100%);
        color: var(--deep);
      }
      .shell {
        padding: 16px;
      }
      .hero {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .hero img {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        box-shadow: 0 8px 18px rgba(17, 48, 86, 0.14);
        background: white;
      }
      .title {
        font-size: 18px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 12px;
        color: #35618d;
      }
      .card {
        background: rgba(255, 250, 248, 0.92);
        border: 1px solid rgba(17, 48, 86, 0.08);
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 14px 32px rgba(31, 142, 231, 0.12);
      }
      .status { margin-bottom: 10px; }
      .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; background: #eee; font-weight: 700; }
      .connected { background: var(--green); }
      .disconnected { background: var(--red); }
      .line { margin: 8px 0; }
      button {
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, #31a1ff, var(--blue));
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { filter: brightness(1.03); }
      code { font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="hero">
        <img src="icons/doraemon.svg" alt="Doraemon icon" />
        <div>
          <div class="title">Doraemon</div>
          <div class="subtitle">Firefox bridge for any CLI</div>
        </div>
      </div>
      <div class="card">
        <div class="status">
          <strong>Status:</strong>
          <span id="badge" class="badge disconnected">Disconnected</span>
        </div>
        <div class="line"><strong>Relay:</strong> <code id="relay-url">http://127.0.0.1:1969</code></div>
        <div class="line"><strong>Error:</strong> <span id="error-text">none</span></div>
        <button id="retry-btn">Reconnect</button>
      </div>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
  </html>
